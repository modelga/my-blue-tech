name: blue

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blue}
      POSTGRES_DB: ${POSTGRES_DB:-blue}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blue}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blue

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: ${API_TARGET:-production}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blue}:${POSTGRES_PASSWORD:-blue}@postgres:5432/${POSTGRES_DB:-blue}
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blue
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/src
          target: /app/src
        - action: rebuild
          path: ./apps/api/package.json
        - action: rebuild
          path: ./apps/api/bun.lock

  # ── Worker ───────────────────────────────────────────────────────────────────
  # Runs pg-boss consumers for initialize-session and process-entry jobs.
  # Scaled independently from the API; no port exposure needed.
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: ${WORKER_TARGET:-production}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blue}:${POSTGRES_PASSWORD:-blue}@postgres:5432/${POSTGRES_DB:-blue}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1 # increase for horizontal scale; pg-boss SKIP LOCKED handles concurrency
    networks:
      - blue
    develop:
      watch:
        - action: sync+restart
          path: ./apps/worker/src
          target: /app/src
        - action: rebuild
          path: ./apps/worker/package.json
        - action: rebuild
          path: ./apps/worker/bun.lock

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-production}
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-changeme-in-production}
      SQLITE_DB_PATH: /data/users.db
    volumes:
      - frontend_sqlite:/data
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - blue
    develop:
      watch:
        - action: sync
          path: ./apps/frontend/src
          target: /app/src
        - action: sync
          path: ./apps/frontend/public
          target: /app/public
        - action: rebuild
          path: ./apps/frontend/package.json
        - action: rebuild
          path: ./apps/frontend/bun.lock
  dashboard:
    image: node:24
    working_dir: /app
    command: sh -c "npm install -g @pg-boss/dashboard && pg-boss-dashboard"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blue}:${POSTGRES_PASSWORD:-blue}@postgres:5432/${POSTGRES_DB:-blue}
      PGBOSS_SCHEMA: pgboss
      PORT: 3000
    ports:
      - "3010:3000"
    networks:
      - blue
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
  # ── Adminer ──────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blue

volumes:
  postgres_data:
  frontend_sqlite:

networks:
  blue:
    driver: bridge
