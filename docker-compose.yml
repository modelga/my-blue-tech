name: blue

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blue}
      POSTGRES_DB: ${POSTGRES_DB:-blue}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blue}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blue

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blue}:${POSTGRES_PASSWORD:-blue}@postgres:5432/${POSTGRES_DB:-blue}
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blue

  # ── Worker ───────────────────────────────────────────────────────────────────
  # Runs pg-boss consumers for initialize-session and process-entry jobs.
  # Scaled independently from the API; no port exposure needed.
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blue}:${POSTGRES_PASSWORD:-blue}@postgres:5432/${POSTGRES_DB:-blue}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1 # increase for horizontal scale; pg-boss SKIP LOCKED handles concurrency
    networks:
      - blue

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-changeme-in-production}
      SQLITE_DB_PATH: /data/users.db
    volumes:
      - frontend_sqlite:/data
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - blue

volumes:
  postgres_data:
  frontend_sqlite:

networks:
  blue:
    driver: bridge
